<!DOCTYPE html>
<html>

<head>
<title>Checkout | Ashanti Maurice Merch</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

header{
background:black;
padding:40px;
}

.checkout-box{
max-width:600px;
margin:auto;
padding:40px;
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

input, select, textarea{
padding:12px;
border-radius:6px;
border:none;
background:#222;
color:white;
font-size:16px;
}

.submit-button{
margin-top:20px;
padding:18px;
background:#ff2a2a;
color:white;
border:none;
border-radius:6px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.payment{
margin-top:30px;
}

.pay-button{
display:block;
margin:10px auto;
padding:15px;
width:80%;
background:#ff2a2a;
color:white;
text-decoration:none;
border-radius:6px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<h1>Ashanti Maurice</h1>
<p>Fight Camp Merch Checkout</p>

</header>

<div class="checkout-box">

<h2>Enter Shipping Details</h2>

<form action="https://formspree.io/f/xpqyyend" method="POST">

<input type="text" name="name" placeholder="Full Name" required>

<input type="text" name="address" placeholder="Shipping Address" required>

<input type="text" name="city" placeholder="City" required>

<input type="text" name="state" placeholder="State" required>

<input type="text" name="zip" placeholder="ZIP Code" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="tel" name="phone" placeholder="Phone Number" required>

<input type="text" name="product" placeholder="Product Ordered" required>

<input type="text" name="size" placeholder="Size" required>

<input type="number" name="quantity" placeholder="Quantity" required>

<select name="payment_method" required>
<option value="">Select Payment Method</option>
<option value="CashApp">CashApp</option>
<option value="Venmo">Venmo</option>
<option value="Zelle">Zelle</option>
</select>

<button class="submit-button" type="submit">
Submit Order
</button>

</form>

<div class="payment">

<h2>Send Payment</h2>

<a class="pay-button" href="https://cash.app/$AshantiMaurice">
Pay with CashApp
</a>

<a class="pay-button" href="https://venmo.com/u/Ashanti-Maurice">
Pay with Venmo
</a>

<a class="pay-button" href="https://enroll.zellepay.com/qr-codes?data=eyJuYW1lIjoiQVNIQU5USSIsImFjdGlvbiI6InBheW1lbnQiLCJ0b2tlbiI6IjczMjMwMDA2NzUifQ==">
Pay with Zelle
</a>

</div>

</div>

</body>
</html>
